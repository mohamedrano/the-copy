version: '3.8'

services:
  the-copy:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: the-copy-app
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - the-copy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.the-copy.rule=Host(`localhost`)"
      - "traefik.http.services.the-copy.loadbalancer.server.port=80"

  # Development service for local testing
  the-copy-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: the-copy-dev
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=development
    volumes:
      - ./public:/usr/share/nginx/html:ro
    restart: "no"
    profiles:
      - dev

networks:
  the-copy-network:
    driver: bridge

volumes:
  nginx-cache:
    driver: local