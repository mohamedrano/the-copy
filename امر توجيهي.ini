
الأمر التوجيهي لوكيل الترميز: إعداد تطبيق "The Copy" للإنتاج

الدور: أنت وكيل ذكاء اصطناعي خبير في تطوير البرمجيات (Full-Stack)، متخصص في TypeScript، Node.js، React، والأمن السيبراني، وممارسات DevOps.

المهمة: مهمتك هي ترقية تطبيق "The Copy" من حالته التجريبية الحالية إلى حالة جاهزة للإنتاج بشكل كامل. يجب عليك معالجة كل الثغرات الأمنية، وإصلاح الأخطاء البرمجية، وتصحيح عمليات النشر (CI/CD) بناءً على تقرير تحليل الفجوات المقدم. اعمل بشكل منهجي ودقيق لضمان أن يكون التطبيق النهائي آمنًا، موثوقًا، وقابلًا للتطوير.

السياق: تم إجراء تحليل شامل للتطبيق، وكشف عن فجوات حرجة في الاختبارات، فحص الأنواع، الأمن، وخط أنابيب النشر. التقرير التالي هو مصدر الحقيقة الوحيد لجميع المهام المطلوبة.

خطة العمل الإلزامية (مرتبة حسب الأولوية):

نفّذ المهام التالية بالترتيب المحدد لضمان معالجة المشاكل الأكثر أهمية أولاً.

المرحلة الأولى: إصلاح البنية التحتية الأساسية (CI/CD والاختبارات)

الهدف: تمكين بيئة تطوير ونشر موثوقة. لا يمكن المتابعة قبل إكمال هذه المرحلة بنجاح.

توحيد مدير الحزم:

الإجراء: قم بتحويل جميع الأوامر في ملف .github/workflows/ci-cd.yml من npm إلى pnpm.

التحقق: تأكد من استبدال npm ci بـ pnpm install --frozen-lockfile، وnpm run بـ pnpm run.

الإجراء: قم بإنشاء ملف pnpm-lock.yaml في جذر المشروع لضمان تثبيت نفس الإصدارات في كل البيئات.

إصلاح وإنشاء سكربتات الاختبار:

الإجراء: في ملف package.json الجذري، أضف سكربت "test:coverage": "pnpm --filter \"./apps/*\" test -- --coverage".

الإجراء: في كل مشروع فرعي (مثل apps/multi-agent-story) يستخدم Vitest، أضف @vitest/coverage-v8 كـ devDependency.

التحقق: تأكد من أن تشغيل pnpm run test:coverage من الجذر يعمل بنجاح ويُصدر تقرير تغطية.

المرحلة الثانية: ضمان جودة الكود وسلامة الأنواع

الهدف: القضاء على أخطاء البناء (Build Errors) وتحسين استقرار الكود.

حل مشاكل فحص الأنواع (TypeScript):

الإجراء: قم بتثبيت @testing-library/react و @testing-library/jest-dom في حزمة apps/multi-agent-story.

الإجراء: في apps/multi-agent-story/src/services/api.ts، قم بتعريف أنواع واضحة لرسائل WebSocket بدلاً من الاعتماد على الأنواع العامة غير المتوافقة.

التحقق: تأكد من أن الأمر pnpm run tsc --noEmit يمر بنجاح في جميع مساحات العمل (Workspaces).

إصلاح أخطاء اللنت (Linting):

الإجراء: في ملف tsconfig.json الخاص بالباك‌اند (apps/multi-agent-story/backend)، أضف "node" إلى مصفوفة compilerOptions.types.

الإجراء: استبدل جميع استخدامات النوع any في الباك‌اند بأنواع مشتقة من Prisma أو Zod لضمان سلامة الأنواع.

التحقق: تأكد من أن الأمر pnpm run lint يمر بنجاح دون أي أخطاء.

المرحلة الثالثة: التعزيز الأمني الشامل

الهدف: إغلاق جميع الثغرات الأمنية الحرجة والمتوسطة.

إدارة الأسرار والمتغيرات البيئية:

الإجراء: في apps/multi-agent-story/backend/src/server.ts، أزل القيمة الافتراضية 'your-secret-key'. استخدم مكتبة مثل zod-env لفرض وجود JWT_SECRET عند بدء التشغيل. إذا كان المتغير غير موجود، يجب أن يفشل التطبيق في الإقلاع.

الإجراء: قم بتحديث ملف .env.example ليشمل جميع المتغيرات المطلوبة للإنتاج (JWT_SECRET, GEMINI_API_KEY, DATABASE_URL, REDIS_URL) مع ترك قيمها فارغة.

تأمين تخزين رموز المصادقة (JWT):

الإجراء: قم بإعادة هيكلة آلية المصادقة. استبدل تخزين JWT في localStorage باستخدام httpOnly و secure cookies.

الإجراء: قم بتنفيذ آلية لتجديد التوكن (Token Refresh) لضمان عدم انتهاء صلاحية الجلسات بشكل مفاجئ.

تقوية سياسات الأمان (CSP & CORS):

الإجراء: في apps/multi-agent-story/backend/src/server.ts، أعد تفعيل contentSecurityPolicy في Helmet بسياسة صارمة تمنع 'unsafe-inline' و 'unsafe-eval'.

الإجراء: اضبط إعدادات CORS للسماح فقط بقائمة محددة من النطاقات (Domains) التي يتم تحميلها من متغيرات البيئة.

المرحلة الرابعة: تحسينات النشر والتطبيق

الهدف: ضمان أن التطبيق يعمل بشكل صحيح وأن عملية النشر موثوقة.

إصلاح Dockerfile وإنشاء سكربت بناء:

الإجراء: قم بتصحيح Dockerfile ليعمل بشكل صحيح مع بنية pnpm workspaces.

الإجراء: أضف سكربت "docker:build": "docker build -f Dockerfile . -t the-copy-app" إلى package.json الجذري.

تفعيل الواجهة الأمامية:

الإجراء: قم بربط المكون apps/multi-agent-story/src/App.tsx مع خدمات الحالة (Zustand) وواجهات برمجة التطبيقات (API services) ليصبح تطبيقًا تفاعليًا يعكس وظيفته الحقيقية.

تحسين استقرار الباك‌اند:

الإجراء: في apps/multi-agent-story/backend/src/routes/sessions.ts، استبدل استخدام setTimeout لتنظيم المهام بنظام طابور مهام (Queue System) قوي مثل BullMQ مع Redis لضمان عدم فقدان المهام عند إعادة تشغيل الخادم.

المرحلة الخامسة: التوثيق والتنظيف النهائي

الهدف: التأكد من أن التوثيق يعكس الحالة الحالية للمشروع.

تحديث التوثيق:

الإجراء: قم بمراجعة وتحديث ملفي README.md و CONTRIBUTING.md ليعكسا استخدام pnpm والسكربتات الجديدة والصحيحة.

الإجراء: قم بإنشاء ملف docs/deployment.md يوضح خطوات إعداد بيئة الإنتاج.

معايير الإنجاز النهائية:
عند الانتهاء من جميع المراحل، يجب أن تستوفي الشروط التالية:

نجاح جميع الفحوصات: يجب أن تجتاز جميع أوامر CI (lint, test:coverage, tsc, build) بنجاح.

التطبيق يعمل بالكامل: يجب أن تكون الواجهة الأمامية والخلفية متكاملتين وتعملان كما هو متوقع.

لا توجد ثغرات حرجة: جميع الثغرات الأمنية المذكورة في التقرير قد تم إغلاقها.

تقرير موجز: قدم ملخصًا للتغييرات الرئيسية التي قمت بها في كل مرحلة.