<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { fill: #e1f5fe; stroke: #01579b; stroke-width: 2px; }
      .node.core { fill: #f3e5f5; stroke: #4a148c; }
      .node.service { fill: #e8f5e8; stroke: #1b5e20; }
      .node.component { fill: #fff3e0; stroke: #e65100; }
      .node.type { fill: #fce4ec; stroke: #880e4f; }
      .edge { stroke: #666; stroke-width: 1px; }
      .label { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
    </style>
  </defs>
  
  <title>Module Dependency Graph - The Copy</title>
  
  <!-- Title -->
  <text x="400" y="30" class="title">Module Dependency Graph - The Copy</text>
  
  <!-- Core Modules -->
  <rect x="50" y="80" width="120" height="60" rx="5" class="node core"/>
  <text x="110" y="105" class="label">App.tsx</text>
  <text x="110" y="120" class="label">(Root Component)</text>
  
  <rect x="200" y="80" width="120" height="60" rx="5" class="node core"/>
  <text x="260" y="105" class="label">main.tsx</text>
  <text x="260" y="120" class="label">(Entry Point)</text>
  
  <!-- Service Modules -->
  <rect x="350" y="80" width="120" height="60" rx="5" class="node service"/>
  <text x="410" y="105" class="label">AnalysisService</text>
  <text x="410" y="120" class="label">(Core Service)</text>
  
  <rect x="500" y="80" width="120" height="60" rx="5" class="node service"/>
  <text x="560" y="105" class="label">InstructionsLoader</text>
  <text x="560" y="120" class="label">(Service)</text>
  
  <!-- Agent Modules -->
  <rect x="50" y="180" width="120" height="60" rx="5" class="node core"/>
  <text x="110" y="205" class="label">AgentFacade</text>
  <text x="110" y="220" class="label">(Core)</text>
  
  <rect x="200" y="180" width="120" height="60" rx="5" class="node service"/>
  <text x="260" y="205" class="label">Analysis Agents</text>
  <text x="260" y="220" class="label">(20+ Agents)</text>
  
  <rect x="350" y="180" width="120" height="60" rx="5" class="node service"/>
  <text x="410" y="205" class="label">Generation Agents</text>
  <text x="410" y="220" class="label">(5 Agents)</text>
  
  <rect x="500" y="180" width="120" height="60" rx="5" class="node service"/>
  <text x="560" y="205" class="label">Evaluation Agents</text>
  <text x="560" y="220" class="label">(3 Agents)</text>
  
  <!-- Component Modules -->
  <rect x="50" y="280" width="120" height="60" rx="5" class="node component"/>
  <text x="110" y="305" class="label">ScreenplayEditor</text>
  <text x="110" y="320" class="label">(Main Component)</text>
  
  <rect x="200" y="280" width="120" height="60" rx="5" class="node component"/>
  <text x="260" y="305" class="label">HomePage</text>
  <text x="260" y="320" class="label">(Component)</text>
  
  <rect x="350" y="280" width="120" height="60" rx="5" class="node component"/>
  <text x="410" y="305" class="label">ProjectsPage</text>
  <text x="410" y="320" class="label">(Component)</text>
  
  <rect x="500" y="280" width="120" height="60" rx="5" class="node component"/>
  <text x="560" y="305" class="label">Other Pages</text>
  <text x="560" y="320" class="label">(4 Components)</text>
  
  <!-- Type Modules -->
  <rect x="50" y="380" width="120" height="60" rx="5" class="node type"/>
  <text x="110" y="405" class="label">types.ts</text>
  <text x="110" y="420" class="label">(Core Types)</text>
  
  <rect x="200" y="380" width="120" height="60" rx="5" class="node type"/>
  <text x="260" y="405" class="label">Agent Types</text>
  <text x="260" y="420" class="label">(Interfaces)</text>
  
  <rect x="350" y="380" width="120" height="60" rx="5" class="node type"/>
  <text x="410" y="405" class="label">Screenplay Types</text>
  <text x="410" y="420" class="label">(Data Models)</text>
  
  <!-- Utility Modules -->
  <rect x="500" y="380" width="120" height="60" rx="5" class="node service"/>
  <text x="560" y="405" class="label">Utils</text>
  <text x="560" y="420" class="label">(Utilities)</text>
  
  <!-- Dependencies -->
  <!-- App to Components -->
  <line x1="110" y1="140" x2="110" y2="280" class="edge"/>
  <line x1="110" y1="140" x2="260" y2="280" class="edge"/>
  <line x1="110" y1="140" x2="410" y2="280" class="edge"/>
  <line x1="110" y1="140" x2="560" y2="280" class="edge"/>
  
  <!-- Components to Services -->
  <line x1="110" y1="340" x2="410" y2="140" class="edge"/>
  <line x1="110" y1="340" x2="560" y2="140" class="edge"/>
  
  <!-- Services to Agents -->
  <line x1="410" y1="140" x2="110" y2="180" class="edge"/>
  <line x1="410" y1="140" x2="260" y2="180" class="edge"/>
  <line x1="560" y1="140" x2="110" y2="180" class="edge"/>
  
  <!-- Agents to Types -->
  <line x1="110" y1="240" x2="110" y2="380" class="edge"/>
  <line x1="260" y1="240" x2="260" y2="380" class="edge"/>
  <line x1="410" y1="240" x2="410" y2="380" class="edge"/>
  <line x1="560" y1="240" x2="560" y2="380" class="edge"/>
  
  <!-- Legend -->
  <rect x="50" y="480" width="20" height="15" class="node core"/>
  <text x="80" y="492" class="label">Core Modules</text>
  
  <rect x="200" y="480" width="20" height="15" class="node service"/>
  <text x="230" y="492" class="label">Service Modules</text>
  
  <rect x="350" y="480" width="20" height="15" class="node component"/>
  <text x="380" y="492" class="label">Component Modules</text>
  
  <rect x="500" y="480" width="20" height="15" class="node type"/>
  <text x="530" y="492" class="label">Type Modules</text>
  
  <!-- Statistics -->
  <text x="50" y="530" class="label">Total Modules: 15</text>
  <text x="200" y="530" class="label">Core: 3</text>
  <text x="350" y="530" class="label">Services: 6</text>
  <text x="500" y="530" class="label">Components: 6</text>
</svg>