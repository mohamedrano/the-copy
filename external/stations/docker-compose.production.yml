version: '3.8'

services:
  # ===========================================
  # التطبيق الرئيسي
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: stations-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://stations_user:${DB_PASSWORD}@db:5432/stations_production
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - VALID_API_KEYS=${VALID_API_KEYS}
      - SESSION_SECRET=${SESSION_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
      - ./analysis_output:/app/analysis_output
    networks:
      - stations-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); });"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # قاعدة البيانات PostgreSQL
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: stations-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=stations_production
      - POSTGRES_USER=stations_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - stations-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stations_user -d stations_production"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Redis للتخزين المؤقت
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: stations-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - stations-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Nginx كـ Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: stations-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - stations-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # مراقب الأداء (اختياري)
  # ===========================================
  monitoring:
    image: prom/prometheus:latest
    container_name: stations-monitoring
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - stations-network

# ===========================================
# الشبكات
# ===========================================
networks:
  stations-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===========================================
# المجلدات
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

