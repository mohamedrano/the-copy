# ===========================================
# إعدادات Nginx للإنتاج - نظام Stations
# ===========================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===========================================
    # إعدادات السجلات
    # ===========================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ===========================================
    # إعدادات الأداء
    # ===========================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ===========================================
    # ضغط الاستجابات
    # ===========================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ===========================================
    # إعدادات الأمان
    # ===========================================
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ===========================================
    # إعدادات التخزين المؤقت
    # ===========================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m;

    # ===========================================
    # إعدادات Upstream
    # ===========================================
    upstream stations_app {
        server app:5000;
        keepalive 32;
    }

    # ===========================================
    # إعادة توجيه HTTP إلى HTTPS
    # ===========================================
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ===========================================
    # الخادم الرئيسي HTTPS
    # ===========================================
    server {
        listen 443 ssl http2;
        server_name _;

        # ===========================================
        # إعدادات SSL
        # ===========================================
        ssl_certificate /etc/nginx/ssl/certificate.crt;
        ssl_certificate_key /etc/nginx/ssl/private.key;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;

        # إعدادات SSL الحديثة
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ===========================================
        # الأصول الثابتة
        # ===========================================
        location /assets/ {
            alias /app/dist/public/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            
            # ضغط الأصول
            gzip_static on;
        }

        # ===========================================
        # API Endpoints
        # ===========================================
        location /api/ {
            proxy_pass http://stations_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # إعدادات timeout
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # إعدادات التخزين المؤقت للAPI
            proxy_cache api_cache;
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;
            
            # إعدادات buffer
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ===========================================
        # Health Check
        # ===========================================
        location /health {
            proxy_pass http://stations_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # لا تخزن health check
            proxy_cache off;
        }

        # ===========================================
        # التطبيق الرئيسي
        # ===========================================
        location / {
            proxy_pass http://stations_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # إعدادات timeout
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            
            # إعدادات buffer
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # ===========================================
        # معالجة الأخطاء
        # ===========================================
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
        
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # ===========================================
    # إعدادات إضافية للأمان
    # ===========================================
    
    # منع الوصول للملفات الحساسة
    location ~ /\. {
        deny all;
    }
    
    # منع الوصول لملفات النسخ الاحتياطي
    location ~ \.(bak|backup|old|orig|original|tmp)$ {
        deny all;
    }
    
    # منع الوصول لملفات التكوين
    location ~ \.(conf|config|ini|log)$ {
        deny all;
    }
}

