# Sentry Configuration for Drama Analyst
# This file contains Sentry project settings

# Project settings
defaults.url=https://sentry.io/
defaults.org=drama-analyst-org
defaults.project=drama-analyst

# Authentication
auth.token=${SENTRY_AUTH_TOKEN}

# Release configuration
release.version=${VITE_APP_VERSION:-1.0.0}
release.environment=${NODE_ENV:-development}

# Upload configuration
upload.sourcemaps=true
upload.rewrite=true
upload.stripPrefix=dist/
upload.stripCommonPrefix=true

# Performance monitoring
performance.enable=true
performance.sampleRate=0.1

# Error tracking
errors.enable=true
errors.sampleRate=1.0

# Session replay
replay.enable=true
replay.sampleRate=0.1

