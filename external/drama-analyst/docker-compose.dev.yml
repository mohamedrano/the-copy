version: '3.8'

# Development Docker Compose Configuration
# Optimized for local development with hot reloading

services:
  # Frontend Development
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: drama-analyst-dev-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_BACKEND_URL=http://backend:3001
      - VITE_USE_BACKEND=true
      - VITE_FALLBACK_DIRECT=true
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Development
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: drama-analyst-dev-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-1.5-flash
      - FRONTEND_URL=http://localhost:5173
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: drama-analyst-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dev-network:
    driver: bridge
    name: drama-analyst-dev

volumes:
  redis_dev_data:
    driver: local

