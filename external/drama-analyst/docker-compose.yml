version: '3.8'

# Drama Analyst Docker Compose Configuration
# Supports multiple deployment scenarios: development, staging, production

services:
  # =====================================================
  # Frontend Services
  # =====================================================
  
  # Frontend Development Server
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: drama-analyst-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dist
    environment:
      - NODE_ENV=development
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - VITE_BACKEND_URL=http://backend-dev:3001
      - VITE_USE_BACKEND=true
      - VITE_FALLBACK_DIRECT=true
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    depends_on:
      backend-dev:
        condition: service_healthy
    networks:
      - drama-analyst-dev
    profiles:
      - development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Production (Nginx)
  frontend-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: drama-analyst-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend-prod:
        condition: service_healthy
    networks:
      - drama-analyst-prod
    profiles:
      - production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =====================================================
  # Backend Services
  # =====================================================
  
  # Backend Development Server
  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: drama-analyst-backend-dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-1.5-flash
      - FRONTEND_URL=http://localhost:5173
    networks:
      - drama-analyst-dev
    profiles:
      - development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend Production Server
  backend-prod:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: drama-analyst-backend-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-1.5-flash
      - FRONTEND_URL=http://localhost
    networks:
      - drama-analyst-prod
    profiles:
      - production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # =====================================================
  # Reverse Proxy
  # =====================================================
  
  # Nginx Load Balancer (Production)
  nginx-lb:
    image: nginx:1.25-alpine
    container_name: drama-analyst-nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend-prod
      - backend-prod
    networks:
      - drama-analyst-prod
    profiles:
      - production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # Database Services (Optional)
  # =====================================================
  
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: drama-analyst-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - drama-analyst-dev
      - drama-analyst-prod
    profiles:
      - cache
      - production
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: drama-analyst-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=drama_analyst
      - POSTGRES_USER=drama_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - drama-analyst-dev
      - drama-analyst-prod
    profiles:
      - database
      - production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drama_user -d drama_analyst"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # Monitoring Services (Optional)
  # =====================================================
  
  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: drama-analyst-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - drama-analyst-prod
    profiles:
      - monitoring
      - production
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: drama-analyst-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    networks:
      - drama-analyst-prod
    profiles:
      - monitoring
      - production
    restart: unless-stopped
    depends_on:
      - prometheus

# =====================================================
# Volumes
# =====================================================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =====================================================
# Networks
# =====================================================
networks:
  drama-analyst-dev:
    driver: bridge
    name: drama-analyst-dev
  drama-analyst-prod:
    driver: bridge
    name: drama-analyst-prod
